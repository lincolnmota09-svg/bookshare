<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clube do Livro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #6c63ff;
  --bg: #f4f6fb;
  --card: #ffffff;
  --text: #333;
  --sub: #777;
}

body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  background: var(--bg);
}

.container {
  max-width: 1100px;
  margin: 30px auto;
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  background: var(--card);
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* INFO CLUBE */
.criador {
  display: flex;
  align-items: center;
  gap: 10px;
}

.criador img {
  width: 60px;
  border-radius: 50%;
}

.livro {
  margin-top: 20px;
}

/* CHAT */
.chat {
  display: flex;
  flex-direction: column;
  height: 500px;
}

.chat-box {
  flex: 1;
  overflow-y: auto;
  padding-right: 10px;
}

/* MENSAGENS */
.msg {
  margin-bottom: 12px;
  max-width: 75%;
}

.msg span {
  font-size: 12px;
  color: var(--sub);
}

.msg p {
  padding: 10px;
  border-radius: 10px;
  margin: 5px 0;
}

.outro {
  text-align: left;
}

.outro p {
  background: #eee;
}

.eu {
  margin-left: auto;
  text-align: right;
}

.eu p {
  background: var(--primary);
  color: white;
}

/* INPUT */
.chat-input {
  display: flex;
  margin-top: 10px;
  gap: 10px;
}

.chat-input input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.chat-input button {
  background: var(--primary);
  border: none;
  color: white;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
}

/* RESPONSIVO */
@media(max-width: 800px){
  .container {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- LADO ESQUERDO -->
  <div class="card">
    <div class="criador">
      <img src="https://via.placeholder.com/100">
      <div>
        <h3>Clube da Maria</h3>
        <p style="color:#777;">Criado por Maria Silva</p>
      </div>
    </div>

    <div class="livro">
      <h4>📖 Livro atual</h4>
      <p>Capítulos 1 ao 10</p>
    </div>

    <button style="margin-top:20px;background:crimson;color:white;border:none;padding:10px;border-radius:8px;width:100%;">
      Sair do Clube
    </button>
  </div>

  <!-- CHAT -->
  <div class="card chat">

    <h3>💬 Chat do Clube</h3>

    <div class="chat-box" id="chatBox">

      <div class="msg outro">
        <span>João</span>
        <p>Alguém já terminou o capítulo 5?</p>
      </div>

      <div class="msg eu">
        <span>Você</span>
        <p>Sim! achei muito bom 😄</p>
      </div>

    </div>

    <div class="chat-input">
      <input type="text" id="msgInput" placeholder="Digite sua mensagem...">
      <button onclick="enviar()">Enviar</button>
    </div>

  </div>

</div>

<script>
function enviar() {
  const input = document.getElementById("msgInput");
  const texto = input.value.trim();
  if (texto === "") return;

  const chatBox = document.getElementById("chatBox");

  const msg = document.createElement("div");
  msg.classList.add("msg", "eu");

  msg.innerHTML = `<span>Você</span><p>${texto}</p>`;

  chatBox.appendChild(msg);

  input.value = "";
  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
