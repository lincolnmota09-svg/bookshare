<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil do Leitor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --cor-primaria: #6c63ff;
  --cor-secundaria: #f5f6fa;
  --cor-texto: #333;
  --cor-sub: #777;
  --branco: #fff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ece9ff, #f5f6fa);
  color: var(--cor-texto);
}

/* CONTAINER */
.container {
  max-width: 1000px;
  margin: 40px auto;
  padding: 20px;
}

/* CARD PERFIL */
.perfil-card {
  background: var(--branco);
  border-radius: 16px;
  padding: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.perfil-card:hover {
  transform: translateY(-5px);
}

/* HEADER */
.perfil-header {
  display: flex;
  align-items: center;
  gap: 25px;
  flex-wrap: wrap;
}

.perfil-header img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 4px solid var(--cor-primaria);
  object-fit: cover;
}

.info h2 {
  font-weight: 600;
}

.info p {
  color: var(--cor-sub);
  margin-top: 5px;
}

/* BOTÃO */
.btn {
  margin-left: auto;
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  background: var(--cor-primaria);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #574fd6;
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-between;
  margin-top: 30px;
  background: var(--cor-secundaria);
  padding: 20px;
  border-radius: 12px;
}

.stat {
  text-align: center;
  flex: 1;
}

.stat h3 {
  font-size: 22px;
}

.stat p {
  color: var(--cor-sub);
}

/* SEÇÃO LIVROS */
.secao {
  margin-top: 30px;
}

.secao h3 {
  margin-bottom: 15px;
}

/* GRID */
.grid-livros {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 20px;
}

/* CARD LIVRO */
.livro {
  background: var(--branco);
  border-radius: 12px;
  padding: 10px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  transition: 0.3s;
}

.livro:hover {
  transform: translateY(-5px) scale(1.03);
}

.livro img {
  width: 100%;
  border-radius: 8px;
}

.livro p {
  margin-top: 8px;
  font-size: 14px;
}

/* RESPONSIVO */
@media (max-width: 600px) {
  .perfil-header {
    flex-direction: column;
    align-items: flex-start;
  }

  .btn {
    margin: 10px 0 0 0;
  }

  .stats {
    flex-direction: column;
    gap: 15px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="perfil-card">
    
    <div class="perfil-header">
      <img src="https://via.placeholder.com/150" alt="Usuário">
      
      <div class="info">
        <h2>Maria Silva</h2>
        <p>📚 Leitora apaixonada por fantasia e ficção científica</p>
      </div>

      <button class="btn">Seguir</button>
    </div>

    <div class="stats">
      <div class="stat">
        <h3>128</h3>
        <p>Livros lidos</p>
      </div>
      <div class="stat">
        <h3>42</h3>
        <p>Favoritos</p>
      </div>
      <div class="stat">
        <h3>15</h3>
        <p>Resenhas</p>
      </div>
    </div>

    <div class="secao">
      <h3>📖 Favoritos</h3>
      <div class="grid-livros">
        
        <div class="livro">
          <img src="https://via.placeholder.com/120x180">
          <p>Livro 1</p>
        </div>

        <div class="livro">
          <img src="https://via.placeholder.com/120x180">
          <p>Livro 2</p>
        </div>

        <div class="livro">
          <img src="https://via.placeholder.com/120x180">
          <p>Livro 3</p>
        </div>

        <div class="livro">
          <img src="https://via.placeholder.com/120x180">
          <p>Livro 4</p>
        </div>

      </div>
    </div>

  </div>

</div>
</body>
</html>
